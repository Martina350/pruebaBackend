name: Control de Servicio Render por Horario

# Este workflow controla automáticamente el encendido y apagado del servicio en Render
# según horarios específicos de Ecuador (UTC-5)

on:
  # Programación automática usando cron (horarios en UTC)
  schedule:
    # Apagar servicio a las 8:40 AM hora Ecuador (13:40 UTC)
    - cron: "40 13 * * *"
    # Encender servicio a las 8:45 AM hora Ecuador (13:45 UTC)
    - cron: "45 13 * * *"
  
  # Permite ejecutar el workflow manualmente desde GitHub Actions
  # Útil para pruebas y control manual
  workflow_dispatch:
    inputs:
      action:
        description: 'Acción a realizar'
        required: true
        type: choice
        options:
          - suspend
          - resume

jobs:
  suspend-service:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '40 13 * * *'
    
    steps:
      - name: Apagar servicio Render
        run: |
          echo "🌙 Apagando servicio a las 8:40 AM hora Ecuador (13:40 UTC)"
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/suspend" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json"
          echo "✅ Servicio apagado exitosamente"

  resume-service:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '45 13 * * *'
    
    steps:
      - name: Encender servicio Render
        run: |
          echo "☀️ Encendiendo servicio a las 8:45 AM hora Ecuador (13:45 UTC)"
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/resume" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json"
          echo "✅ Servicio encendido exitosamente"

  manual-control:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Ejecutar acción manual
        run: |
          ACTION="${{ github.event.inputs.action }}"
          echo "🔧 Ejecutando acción manual: $ACTION"
          
          if [ "$ACTION" == "suspend" ]; then
            echo "🌙 Apagando servicio manualmente..."
            curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/suspend" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              -H "Accept: application/json"
            echo "✅ Servicio apagado"
          elif [ "$ACTION" == "resume" ]; then
            echo "☀️ Encendiendo servicio manualmente..."
            curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/resume" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              -H "Accept: application/json"
            echo "✅ Servicio encendido"
          fi
