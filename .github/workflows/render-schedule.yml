name: Control Automático de Servicio Render

# Workflow completamente automático para controlar el servicio de Render
# Horarios configurados para Ecuador (UTC-5)

on:
  schedule:
    # Apagar servicio a las 11:25 AM hora Ecuador (16:25 UTC)
    - cron: "25 16 * * *"
    # Encender servicio a las 11:30 AM hora Ecuador (16:30 UTC)
    - cron: "30 16 * * *"

jobs:
  control-service:
    name: Control de Servicio Render
    runs-on: ubuntu-latest
    
    steps:
      - name: Determinar acción según la hora
        id: determine-action
        run: |
          CURRENT_MINUTE=$(date -u +%M)
          CURRENT_HOUR=$(date -u +%H)
          
          echo "⏰ Hora actual UTC: $CURRENT_HOUR:$CURRENT_MINUTE"
          
          # Determinar si es hora de suspender (16:25 UTC)
          if [ "$CURRENT_HOUR" -eq 16 ] && [ "$CURRENT_MINUTE" -ge 25 ] && [ "$CURRENT_MINUTE" -lt 30 ]; then
            echo "action=suspend" >> $GITHUB_OUTPUT
            echo "🌙 Acción determinada: SUSPEND"
          # Determinar si es hora de reanudar (16:30 UTC)
          elif [ "$CURRENT_HOUR" -eq 16 ] && [ "$CURRENT_MINUTE" -ge 30 ]; then
            echo "action=resume" >> $GITHUB_OUTPUT
            echo "☀️ Acción determinada: RESUME"
          else
            echo "action=none" >> $GITHUB_OUTPUT
            echo "⚠️ No se ejecutará ninguna acción en este horario"
          fi

      - name: Validar configuración
        if: steps.determine-action.outputs.action != 'none'
        run: |
          echo "🔍 Validando variables de entorno..."
          if [ -z "${{ secrets.RENDER_SERVICE_ID }}" ]; then
            echo "❌ ERROR: RENDER_SERVICE_ID no está configurado"
            exit 1
          fi
          if [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "❌ ERROR: RENDER_API_KEY no está configurado"
            exit 1
          fi
          echo "✅ Variables configuradas correctamente"

      - name: Suspender servicio en Render
        if: steps.determine-action.outputs.action == 'suspend'
        run: |
          echo "🌙 Iniciando suspensión del servicio..."
          echo "⏰ Hora: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📍 Horario Ecuador: 11:25 AM"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/suspend" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 202 ]; then
            echo "✅ Servicio suspendido exitosamente"
            echo "📊 Código HTTP: $HTTP_CODE"
          else
            echo "❌ Error al suspender el servicio"
            echo "📊 Código HTTP: $HTTP_CODE"
            echo "📄 Respuesta: $BODY"
            exit 1
          fi

      - name: Reanudar servicio en Render
        if: steps.determine-action.outputs.action == 'resume'
        run: |
          echo "☀️ Iniciando reanudación del servicio..."
          echo "⏰ Hora: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📍 Horario Ecuador: 11:30 AM"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/resume" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 202 ]; then
            echo "✅ Servicio reanudado exitosamente"
            echo "📊 Código HTTP: $HTTP_CODE"
            echo "🔄 Esperando que el servicio esté completamente activo..."
            sleep 10
            echo "✅ Servicio debería estar activo ahora"
          else
            echo "❌ Error al reanudar el servicio"
            echo "📊 Código HTTP: $HTTP_CODE"
            echo "📄 Respuesta: $BODY"
            exit 1
          fi

      - name: Registro de operación
        if: steps.determine-action.outputs.action != 'none'
        run: |
          ACTION="${{ steps.determine-action.outputs.action }}"
          echo "� Resumen de la operación:"
          echo "   - Acción: $ACTION"
          echo "   - Estado: COMPLETADO"
          echo "   - Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          if [ "$ACTION" == "resume" ]; then
            echo "🎉 Ciclo de suspensión/reanudación completado"
          fi
