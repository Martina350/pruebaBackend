name: Reanudar Servicio Render

on:
  schedule:
    # Encender servicio a las 1:00 PM hora Ecuador (18:00 UTC)
    - cron: "0 18 * * *"
  # Trigger manual para pruebas (eliminar después de la primera ejecución)
  workflow_dispatch:

jobs:
  resume-service:
    name: Reanudar Servicio Render
    runs-on: ubuntu-latest
    
    steps:
      - name: Validar configuración
        run: |
          echo "🔍 Validando variables de entorno..."
          if [ -z "${{ secrets.RENDER_SERVICE_ID }}" ]; then
            echo "❌ ERROR: RENDER_SERVICE_ID no está configurado"
            exit 1
          fi
          if [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "❌ ERROR: RENDER_API_KEY no está configurado"
            exit 1
          fi
          echo "✅ Variables configuradas correctamente"

      - name: Reanudar servicio en Render
        run: |
          echo "☀️ Iniciando reanudación del servicio..."
          echo "⏰ Hora: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📍 Horario Ecuador: 1:00 PM"
          echo "🔑 Service ID: ${{ secrets.RENDER_SERVICE_ID }}"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/resume" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "📊 Código HTTP: $HTTP_CODE"
          echo "📄 Respuesta completa: $BODY"
          
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 202 ]; then
            echo "✅ Servicio reanudado exitosamente"
            echo "⏳ Esperando 10 segundos para que el servicio esté completamente activo..."
            sleep 10
          else
            echo "❌ Error al reanudar el servicio"
            exit 1
          fi

      - name: Verificar estado del servicio
        run: |
          echo "🔍 Verificando estado del servicio..."
          
          STATUS_RESPONSE=$(curl -s \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json")
          
          echo "📄 Estado del servicio: $STATUS_RESPONSE"
          
          # Intentar extraer el estado si la respuesta es JSON
          if command -v jq &> /dev/null; then
            SERVICE_STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.suspended // "unknown"')
            echo "🔍 Suspended: $SERVICE_STATUS"
          fi

      - name: Registro de reanudación
        run: |
          echo "📝 Resumen de la operación:"
          echo "   - Acción: RESUME"
          echo "   - Estado: COMPLETADO"
          echo "   - Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🎉 Servicio reanudado correctamente"
